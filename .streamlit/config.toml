[server]
# torch trips Streamlit's source watcher (torch.classes __path__ crash); disable it.
fileWatcherType = "none"
# allow large hydrophone recordings (MB). Community Cloud RAM is the real limit.
maxUploadSize = 400
maxMessageSize = 400

[theme]
base = "dark"
primaryColor = "#00f0ff"
backgroundColor = "#060b12"
secondaryBackgroundColor = "#0d1622"
textColor = "#e6f6ff"
font = "monospace"

[browser]
gatherUsageStats = false
