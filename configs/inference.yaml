# Inference & post-processing (Phase 1/3). Thresholds are re-tuned per model
# on the synthetic validation set for the asymmetric IER (miss=1.0, FA=0.25):
# deliberately low thresholds -> recall-biased.
block_seconds: 30.0                 # streaming decode block for huge files
block_overlap_seconds: 2.0

posteriors:
  median_filter_seconds: 0.7

thresholds:                         # per-class hysteresis: onset high, sustain low
  vessel:              {high: 0.40, low: 0.20}
  marine_animal:       {high: 0.35, low: 0.15}
  natural_sound:       {high: 0.40, low: 0.20}
  other_anthropogenic: {high: 0.30, low: 0.15}

events:
  merge_gap_seconds: 1.0            # merge same-class events separated by short gaps
  min_duration_seconds: 1.0         # drop shorter events (timestamps round to seconds anyway)
  round_to_seconds: true
  enforce_non_overlap: true         # PS-12 rejects overlapping annotations

json:
  startup_name: "ECHOSENTINEL"
